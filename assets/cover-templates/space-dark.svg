<?xml version="1.0" encoding="UTF-8"?>
<!-- KDP Cover Template: space-dark
     Full cover (front + spine + back) at 300 DPI
     Placeholder dimensions  actual width computed at runtime via spine calculator
     Front: 8.5" + 0.125" bleed = 8.625" wide, 11" + 0.25" bleed = 11.25" tall
     Spine: computed (pages × 0.002252 + 0.06) inches
     Back: same as front
     Total canvas width = front + spine + back + bleeds (set at runtime)
-->
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     id="kdp-cover-space-dark"
     data-template="space-dark"
     data-style="space"
     viewBox="0 0 2625 3375"
     width="2625" height="3375">

  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#03001C"/>
      <stop offset="50%" style="stop-color:#130046"/>
      <stop offset="100%" style="stop-color:#03001C"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="2625" height="3375" fill="url(#bg-grad)"/>

  <!-- Star field (decorative) -->
  <g id="stars" opacity="0.7">
    <circle cx="120" cy="200" r="2" fill="white"/>
    <circle cx="340" cy="90" r="1.5" fill="white"/>
    <circle cx="600" cy="310" r="2" fill="#a0cfff"/>
    <circle cx="850" cy="150" r="1" fill="white"/>
    <circle cx="1100" cy="250" r="2.5" fill="#ffd6a5"/>
    <circle cx="1400" cy="80" r="1.5" fill="white"/>
    <circle cx="1700" cy="190" r="2" fill="white"/>
    <circle cx="2000" cy="130" r="1" fill="#a0cfff"/>
    <circle cx="2300" cy="280" r="2" fill="white"/>
    <circle cx="2500" cy="60" r="1.5" fill="white"/>
    <circle cx="180" cy="900" r="1.5" fill="white"/>
    <circle cx="450" cy="1100" r="2" fill="#ffd6a5"/>
    <circle cx="2100" cy="800" r="1.5" fill="white"/>
    <circle cx="2400" cy="1000" r="2" fill="white"/>
    <circle cx="300" cy="2800" r="1.5" fill="white"/>
    <circle cx="2300" cy="2900" r="2" fill="#a0cfff"/>
  </g>

  <!-- Nebula accent circles -->
  <circle cx="1312" cy="1000" r="600" fill="#7B2FBE" opacity="0.08"/>
  <circle cx="1312" cy="1000" r="400" fill="#3D1A8B" opacity="0.1"/>

  <!-- Central art placeholder  replaced at runtime with AI-generated image -->
  <g id="central_art">
    <rect id="central_art_bounds"
          x="412" y="500" width="1800" height="1800"
          fill="none" stroke="#4a3080" stroke-width="2" stroke-dasharray="20,10"/>
    <text x="1312" y="1430" text-anchor="middle" fill="#4a3080" font-family="serif" font-size="48"
          opacity="0.5">[AI ART PLACEHOLDER]</text>
  </g>

  <!-- Title area -->
  <g id="title_area">
    <rect x="162" y="2400" width="2300" height="320" rx="8"
          fill="#03001C" opacity="0.75"/>
    <!-- Title text  replaced at runtime -->
    <text id="title_text"
          x="1312" y="2530" text-anchor="middle"
          fill="#E8D5FF" font-family="Georgia, serif" font-size="96" font-weight="bold"
          filter="url(#glow)">[BOOK TITLE]</text>
    <!-- Subtitle / type label -->
    <text id="subtitle_text"
          x="1312" y="2650" text-anchor="middle"
          fill="#9B72CF" font-family="Georgia, serif" font-size="52" letter-spacing="8">
      COLORING BOOK
    </text>
  </g>

  <!-- Author area -->
  <g id="author_area">
    <text id="author_text"
          x="1312" y="3200" text-anchor="middle"
          fill="#7B5EA7" font-family="Georgia, serif" font-size="52">
      [AUTHOR NAME]
    </text>
  </g>

  <!-- Decorative border -->
  <rect x="40" y="40" width="2545" height="3295"
        fill="none" stroke="#4a3080" stroke-width="6" opacity="0.6" rx="12"/>

  <!-- Back cover description area (left side  for full-cover layout) -->
  <g id="back_description_area" transform="translate(0,0)">
    <rect id="back_text_bounds"
          x="80" y="400" width="700" height="2400"
          fill="none" stroke="#4a3080" stroke-width="1" stroke-dasharray="10,8" opacity="0.3"/>
  </g>

</svg>
