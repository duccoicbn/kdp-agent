<?xml version="1.0" encoding="UTF-8"?>
<!-- KDP Cover Template: anime-vibrant  bright manga-inspired palette -->
<svg xmlns="http://www.w3.org/2000/svg"
     id="kdp-cover-anime-vibrant"
     data-template="anime-vibrant"
     data-style="anime"
     viewBox="0 0 2625 3375"
     width="2625" height="3375">

  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF0F5"/>
      <stop offset="100%" style="stop-color:#FFF9E6"/>
    </linearGradient>
    <linearGradient id="header-band" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B9D"/>
      <stop offset="50%" style="stop-color:#FF8E53"/>
      <stop offset="100%" style="stop-color:#FFC107"/>
    </linearGradient>
    <linearGradient id="footer-band" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667EEA"/>
      <stop offset="100%" style="stop-color:#764BA2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="2625" height="3375" fill="url(#bg-grad)"/>

  <!-- Header band -->
  <rect x="0" y="0" width="2625" height="180" fill="url(#header-band)"/>

  <!-- Decorative halftone dots (top right) -->
  <g opacity="0.12" fill="#FF6B9D">
    <circle cx="2200" cy="400" r="15"/><circle cx="2260" cy="400" r="15"/>
    <circle cx="2320" cy="400" r="15"/><circle cx="2380" cy="400" r="15"/>
    <circle cx="2200" cy="460" r="15"/><circle cx="2260" cy="460" r="15"/>
    <circle cx="2320" cy="460" r="15"/><circle cx="2380" cy="460" r="15"/>
    <circle cx="2200" cy="520" r="15"/><circle cx="2260" cy="520" r="15"/>
    <circle cx="2320" cy="520" r="15"/><circle cx="2380" cy="520" r="15"/>
  </g>

  <!-- Manga speed lines (subtle) -->
  <g stroke="#FFD6E8" stroke-width="1.5" opacity="0.3">
    <line x1="1312" y1="1400" x2="200" y2="200"/>
    <line x1="1312" y1="1400" x2="600" y2="180"/>
    <line x1="1312" y1="1400" x2="1000" y2="150"/>
    <line x1="1312" y1="1400" x2="1600" y2="160"/>
    <line x1="1312" y1="1400" x2="2000" y2="200"/>
    <line x1="1312" y1="1400" x2="2400" y2="300"/>
  </g>

  <!-- Central art placeholder -->
  <g id="central_art">
    <rect id="central_art_bounds"
          x="412" y="250" width="1800" height="1900"
          fill="#FFF5F8" stroke="#FFB3C8" stroke-width="3" rx="12"/>
    <text x="1312" y="1230" text-anchor="middle" fill="#FFB3C8" font-family="sans-serif" font-size="48"
          opacity="0.6">[AI ART PLACEHOLDER]</text>
  </g>

  <!-- Title area -->
  <g id="title_area">
    <rect x="100" y="2250" width="2425" height="380" rx="12" fill="url(#footer-band)" opacity="0.92"/>
    <text id="title_text"
          x="1312" y="2400" text-anchor="middle"
          fill="white" font-family="Georgia, serif" font-size="92" font-weight="bold">
      [BOOK TITLE]
    </text>
    <text id="subtitle_text"
          x="1312" y="2560" text-anchor="middle"
          fill="#E0D4FF" font-family="sans-serif" font-size="52" letter-spacing="6">
      ANIME COLORING BOOK
    </text>
  </g>

  <!-- Author area -->
  <g id="author_area">
    <text id="author_text"
          x="1312" y="3200" text-anchor="middle"
          fill="#764BA2" font-family="Georgia, serif" font-size="52">
      [AUTHOR NAME]
    </text>
  </g>

  <!-- Outer border -->
  <rect x="20" y="20" width="2585" height="3335"
        fill="none" stroke="#FF6B9D" stroke-width="8" rx="12" opacity="0.4"/>
  <rect x="35" y="35" width="2555" height="3305"
        fill="none" stroke="#FFC107" stroke-width="3" rx="10" opacity="0.3"/>

  <!-- Back cover area -->
  <g id="back_description_area">
    <rect id="back_text_bounds" x="80" y="300" width="700" height="2400"
          fill="none" stroke="#FFB3C8" stroke-width="1" stroke-dasharray="10,8" opacity="0.4"/>
  </g>
</svg>
